name: Deploy CarePlan · Specialcare

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: careplan-production
  cancel-in-progress: false

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run build:functions
      - run: npm audit --omit=dev

  deploy:
    needs: qa
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
      CAREPLAN_D1_DATABASE_NAME: ${{ vars.CAREPLAN_D1_DATABASE_NAME }}
      CAREPLAN_R2_BUCKET_NAME: ${{ vars.CAREPLAN_R2_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Verify deployment configuration
        run: npm run deploy:verify
      - name: Apply versioned D1 migrations
        run: npx wrangler d1 migrations apply "$CAREPLAN_D1_DATABASE_NAME" --remote --config wrangler.jsonc
      - name: Deploy Pages assets and Functions
        shell: bash
        run: |
          COMMIT_MESSAGE="$(git log -1 --pretty=%s)"
          npx wrangler pages deploy public \
            --project-name="$CLOUDFLARE_PAGES_PROJECT" \
            --branch=main \
            --commit-hash="$GITHUB_SHA" \
            --commit-message="$COMMIT_MESSAGE"
